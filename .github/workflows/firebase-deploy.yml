name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        run: firebase target:apply hosting fivecatstudios fivecatstudios && firebase deploy --only hosting:fivecatstudios --project five-cats-studios-3d236
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
