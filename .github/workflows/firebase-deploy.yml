name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/36736049889/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-action-1196654935@five-cats-studios-3d236.iam.gserviceaccount.com

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting --project five-cats-studios-3d236 --non-interactive
