*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg-deep: #0F0D1A; --bg-main: #1A1A2E; --bg-card: rgba(255,255,255,0.04); --border: rgba(232,104,63,0.18); --orange: #E8683F; --gold: #F5CC5B; --amber: #E8A83E; --pink: #D4547A; --green: #4A7A3D; --cream: #FCF5D7; --text: #FCF5D7; --text-dim: rgba(252,245,215,0.65); --text-faint: rgba(252,245,215,0.35); }
html { scroll-behavior: smooth; }
body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg-deep); color: var(--text); line-height: 1.7; min-height: 100vh; overflow-x: hidden; }
.ks-banner { position: fixed; top: 0; left: 0; right: 0; z-index: 200; height: 44px; background: linear-gradient(90deg, #05CE78 0%, #00B86A 100%); color: #fff; display: flex; align-items: center; justify-content: center; gap: 10px; font-family: 'Inter', sans-serif; font-size: 0.875rem; font-weight: 600; text-align: center; letter-spacing: 0.01em; }
.ks-banner-badge { background: rgba(0,0,0,0.18); border-radius: 4px; padding: 2px 8px; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; }
.ks-banner a { color: #fff; text-decoration: underline; text-underline-offset: 2px; }
.ks-banner a:hover { opacity: 0.85; }
.btn-ks { display: inline-flex; align-items: center; gap: 10px; padding: 16px 36px; background: #05CE78; color: #fff; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 1.05rem; font-weight: 700; text-decoration: none; transition: background 0.2s, transform 0.2s, box-shadow 0.2s; animation: ksPulse 2.5s ease-in-out infinite; }
.btn-ks:hover { background: #00A85F; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(5,206,120,0.35); }
@keyframes ksPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(5,206,120,0.45); } 50% { box-shadow: 0 0 0 14px rgba(5,206,120,0); } }
