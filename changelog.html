<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dev Changelog &mdash; Smoke &amp; Honey</title>
  <link rel="icon" type="image/png" sizes="32x32" href="images/logo_32.png">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --wd-darkest:    #261206;
      --wd-dark:       #46260C;
      --wd-mid:        #6C4016;
      --wd-light:      #94602A;
      --wd-pale:       #BA8A48;
      --amber-dark:    #985808;
      --amber-mid:     #C8820C;
      --amber-light:   #E6A220;
      --honey-pale:    #F4CC6E;
      --wax-cream:     #F2E4B2;
      --wax-white:     #FCF5D7;
      --cell-honey:    #D49E28;
      --bg:            #0B0703;
      --bg-warm:       #140E06;
      --bg-card:       rgba(38,18,6,0.7);
      --text:          #F2E4B2;
      --text-dim:      rgba(242,228,178,0.62);
      --text-faint:    rgba(242,228,178,0.32);
      --border:        rgba(108,64,22,0.35);
      --glow:          rgba(230,162,32,0.07);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
    }
